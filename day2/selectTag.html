<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select name="country">
        <option>India</option>
        <option>england</option>
        <option>UK</option>
        <option selected>Canada</option>
        <option selected disabled>country</option>
        <option label="USA">United States of America</option>
    </select>
    <select required>
        <option>Delhi</option>
        <option>Mysore</option>
    </select>
    <select disabled>
        <option>Delhi</option>
        <option>Mysore</option>
    </select>
    <select multiple>
        <option>Delhi</option>
        <option>Mysore</option>
    </select>
    <select size="3" required>
        <option>Delhi</option>
        <option>Mysore</option>
        <option>hyderabad</option>
        <option>chennai</option>
    </select>
</body>
</html>
